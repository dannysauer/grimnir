services:
  aggregator:
    build:
      context: .
      dockerfile: aggregator/Dockerfile
    image: csi-aggregator
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "${UDP_PORT:-5005}:5005/udp"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: csi-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

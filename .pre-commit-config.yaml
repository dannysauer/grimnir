repos:
  # ── General file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]

      # YAML — Helm templates use {{ }} syntax that is not valid YAML;
      # exclude them from syntax checking.
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^bifrost/helm/grimnir/templates/

      # JSON — validates syntax only, no schema checking.
      - id: check-json

  # ── Python: ruff (lint + format) ─────────────────────────────────────────────
  # ruff replaces flake8, isort, and black in a single fast tool.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff          # linting + auto-fix
        args: [--fix]
      - id: ruff-format   # opinionated formatting (black-compatible)

  # ── Shell scripts ────────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

  # ── GitHub Actions workflow linting ──────────────────────────────────────────
  # actionlint checks workflow YAML syntax and the inline shell scripts
  # within `run:` blocks (delegating to shellcheck where available).
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

ci:
  # pre-commit.ci auto-fixes and pushes corrections back on PRs.
  # Skip hooks that need network access at fix time.
  skip: []
  autoupdate_schedule: weekly

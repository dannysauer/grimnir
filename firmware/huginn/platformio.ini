; PlatformIO build configuration for Huginn (CSI transmitter, ESP32-S3)
;
; Uses the ESP-IDF framework (NOT Arduino — the CSI APIs are IDF-only).
; Useful if you already have PlatformIO installed, e.g. via ESPHome.
; The existing CMakeLists.txt / main/ structure is reused as-is.
;
; Edit firmware/config.h before building.
;
; Build:    pio run
; Flash:    pio run -t upload
; Monitor:  pio device monitor
; Both:     pio run -t upload && pio device monitor
;
; If your board uses the native USB port (not the UART bridge), pass:
;   pio run -t upload --upload-port /dev/ttyACM0
; or set upload_port below.
;
; Renovate manages the platform version — do not edit the version comment.
; The ESP-IDF CLI (idf.py) is also fully supported; see:
;   docs/firmware-build-and-flash.md

[env:huginn]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200

{{- if .Values.vpa.enabled }}
# Requires the VPA CRD (autoscaling.k8s.io/v1).
# Install: https://github.com/kubernetes/autoscaler/tree/master/vertical-pod-autoscaler
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ printf "%s-geri" (include "grimnir.fullname" .) }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
    app.kubernetes.io/component: geri
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-geri" (include "grimnir.fullname" .) }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: geri
        minAllowed:
          {{- toYaml .Values.vpa.geri.minAllowed | nindent 10 }}
        maxAllowed:
          {{- toYaml .Values.vpa.geri.maxAllowed | nindent 10 }}
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ printf "%s-freki" (include "grimnir.fullname" .) }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
    app.kubernetes.io/component: freki
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-freki" (include "grimnir.fullname" .) }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: freki
        minAllowed:
          {{- toYaml .Values.vpa.freki.minAllowed | nindent 10 }}
        maxAllowed:
          {{- toYaml .Values.vpa.freki.maxAllowed | nindent 10 }}
{{- end }}

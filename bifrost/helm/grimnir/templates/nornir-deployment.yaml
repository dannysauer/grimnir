{{- if .Values.nornir.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-nornir" (include "grimnir.fullname" .) }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
    app.kubernetes.io/component: nornir
spec:
  replicas: {{ .Values.nornir.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "grimnir.selectorLabels" (merge (dict "component" "nornir") .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "grimnir.selectorLabels" (merge (dict "component" "nornir") .) | nindent 8 }}
        app.kubernetes.io/component: nornir
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- if .Values.nornir.gpu.enabled }}
      {{- with .Values.nornir.gpu.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      containers:
        - name: nornir
          image: {{ include "grimnir.nornir.image" . }}
          imagePullPolicy: {{ .Values.image.nornir.pullPolicy }}
          env:
            - name: FREKI_URL
              value: {{ printf "http://%s-freki:%d" (include "grimnir.fullname" .) (.Values.freki.service.port | int) | quote }}
            {{- range $k, $v := .Values.nornir.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if .Values.nornir.gpu.enabled }}
          resources:
            limits:
              nvidia.com/gpu: "1"
            {{- with .Values.nornir.resources }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.nornir.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
{{- end }}

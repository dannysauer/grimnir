{{- if and (not .Values.mlControlAuth.existingSecret) .Values.mlControlAuth.sharedSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grimnir.mlControlSecretName" . }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.mlControlAuth.secretKey }}: {{ .Values.mlControlAuth.sharedSecret | quote }}
{{- end }}

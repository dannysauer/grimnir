apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-freki" (include "grimnir.fullname" .) }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
    app.kubernetes.io/component: freki
  {{- with .Values.freki.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.freki.service.type }}
  # ClientIP affinity keeps long-lived SSE connections on the same pod when
  # freki.replicaCount > 1, reducing unnecessary client reconnects.
  sessionAffinity: ClientIP
  selector:
    {{- include "grimnir.selectorLabels" (merge (dict "component" "freki") .) | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.freki.service.port }}
      targetPort: http
      protocol: TCP

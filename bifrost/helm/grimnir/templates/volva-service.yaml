{{- if .Values.volva.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-volva" (include "grimnir.fullname" .) }}
  labels:
    {{- include "grimnir.labels" . | nindent 4 }}
    app.kubernetes.io/component: volva
  {{- with .Values.volva.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.volva.service.type }}
  ports:
    - port: {{ .Values.volva.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "grimnir.selectorLabels" (merge (dict "component" "volva") .) | nindent 4 }}
{{- end }}

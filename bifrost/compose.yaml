# bifrost/compose.yaml — Grimnir standalone deployment
#
# Usage:
#   cp .env.example .env   # then edit DATABASE_URL
#   docker compose -f bifrost/compose.yaml up -d
#
# Exposes:
#   UDP 5005  — ESP32 CSI data ingress (Geri)
#   TCP 8000  — Web dashboard + API (Freki + Hlidskjalf)
#
# Note: PostgreSQL is NOT included — provide DATABASE_URL in .env pointing at
#       your existing TimescaleDB instance.

services:

  geri:
    build:
      context: ..
      dockerfile: geri/Dockerfile
    image: grimnir/geri:latest
    restart: unless-stopped
    environment:
      DATABASE_URL:     ${DATABASE_URL}
      UDP_HOST:         "0.0.0.0"
      UDP_PORT:         "5005"
      BATCH_SIZE:       "50"
      BATCH_TIMEOUT_MS: "500"
      LOG_LEVEL:        "info"
    ports:
      - "5005:5005/udp"
    networks:
      - grimnir-internal
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f geri || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  freki:
    build:
      context: ..
      dockerfile: freki/Dockerfile
    image: grimnir/freki:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HOST:         "0.0.0.0"
      PORT:         "8000"
      LOG_LEVEL:    "info"
    ports:
      - "8000:8000"
    networks:
      - grimnir-internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      geri:
        condition: service_started

  nornir:
    build:
      context: ..
      dockerfile: nornir/Dockerfile
    image: grimnir/nornir:latest
    restart: unless-stopped
    environment:
      FREKI_URL:         "http://freki:8000"
      METRICS_PORT:      "8001"
      DAEMON_NAME:       "nornir-1"
      CLAIM_INTERVAL_S:  "10"
      HEARTBEAT_S:       "30"
      LOG_LEVEL:         "info"
    networks:
      - grimnir-internal
    depends_on:
      freki:
        condition: service_started

  volva:
    build:
      context: ..
      dockerfile: volva/Dockerfile
    image: grimnir/volva:latest
    restart: unless-stopped
    environment:
      FREKI_URL:       "http://freki:8000"
      HOST:            "0.0.0.0"
      PORT:            "8002"
      WINDOW_SIZE:     "50"
      MODEL_REFRESH_S: "30"
      LOG_LEVEL:       "info"
    networks:
      - grimnir-internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8002/health').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      freki:
        condition: service_started

networks:
  grimnir-internal:
    driver: bridge

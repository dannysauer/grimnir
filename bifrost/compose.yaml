# bifrost/compose.yaml — Grimnir standalone deployment
#
# Usage:
#   cp .env.example .env   # then edit DATABASE_URL
#   docker compose -f bifrost/compose.yaml up -d
#
# Exposes:
#   UDP 5005  — ESP32 CSI data ingress (Geri)
#   TCP 8000  — Web dashboard + API (Freki + Hlidskjalf)
#
# Note: PostgreSQL is NOT included — provide DATABASE_URL in .env pointing at
#       your existing TimescaleDB instance.

services:

  geri:
    build:
      context: ..
      dockerfile: geri/Dockerfile
    image: grimnir/geri:latest
    restart: unless-stopped
    environment:
      DATABASE_URL:     ${DATABASE_URL}
      UDP_HOST:         "0.0.0.0"
      UDP_PORT:         "5005"
      BATCH_SIZE:       "50"
      BATCH_TIMEOUT_MS: "500"
      LOG_LEVEL:        "info"
    ports:
      - "5005:5005/udp"
    networks:
      - grimnir-internal
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f geri || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  freki:
    build:
      context: ..
      dockerfile: freki/Dockerfile
    image: grimnir/freki:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HOST:         "0.0.0.0"
      PORT:         "8000"
      LOG_LEVEL:    "info"
    ports:
      - "8000:8000"
    networks:
      - grimnir-internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      geri:
        condition: service_started

  # Nornir — ML training daemon. Polls Freki for queued training jobs,
  # trains scikit-learn models, and uploads results. No direct DB access needed.
  #
  # Run multiple Nornir instances on different machines by setting a unique
  # NORNIR_NAME for each and pointing them at the same FREKI_URL.
  nornir:
    build:
      context: ..
      dockerfile: nornir/Dockerfile
    image: grimnir/nornir:latest
    restart: unless-stopped
    environment:
      FREKI_URL:                "http://freki:8000"
      DAEMON_NAME:              ${NORNIR_NAME:-nornir-local}
      HEARTBEAT_INTERVAL_S:     "30"
      JOB_HEARTBEAT_INTERVAL_S: "10"
      LOG_LEVEL:                "info"
    # ── GPU support ────────────────────────────────────────────────────────────
    # Uncomment the deploy section below to enable GPU access.
    # Requires nvidia-container-toolkit installed on the host:
    #   https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1             # or "all" to expose all GPUs
    #           capabilities: [gpu]
    networks:
      - grimnir-internal
    depends_on:
      freki:
        condition: service_healthy

  # Völva — inference service. Subscribes to Freki's live CSI stream, applies
  # the active model, and exposes room occupancy predictions via REST and SSE.
  # Home Assistant REST sensor: http://<host>:8002/api/predictions/current
  volva:
    build:
      context: ..
      dockerfile: volva/Dockerfile
    image: grimnir/volva:latest
    restart: unless-stopped
    environment:
      FREKI_URL:             "http://freki:8000"
      HOST:                  "0.0.0.0"
      PORT:                  "8002"
      MODEL_POLL_INTERVAL_S: "60"
      LOG_LEVEL:             "info"
    ports:
      - "8002:8002"
    networks:
      - grimnir-internal
    depends_on:
      freki:
        condition: service_healthy

networks:
  grimnir-internal:
    driver: bridge

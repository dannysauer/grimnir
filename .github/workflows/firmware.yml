name: Firmware

on:
  push:
    branches:
      - main
    paths:
      - "firmware/**"

  # Allow manual builds with optional overrides
  workflow_dispatch:
    inputs:
      receiver_1_name:
        description: Name for first Muninn receiver (flashed as RECEIVER_NAME)
        default: rx_ground
      receiver_2_name:
        description: Name for second Muninn receiver
        default: rx_upstairs
      aggregator_host:
        description: Aggregator hostname the receivers will send to
        default: csi-aggregator.home.arpa

permissions:
  contents: write   # upload release artifacts

jobs:
  build:
    name: Build ${{ matrix.firmware.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # build all targets even if one fails
      matrix:
        firmware:
          - name: huginn
            dir: firmware/huginn
            is_receiver: false
            receiver_name: huginn   # unused for transmitter but must be set

          - name: muninn-1
            dir: firmware/muninn
            is_receiver: true
            receiver_name: ${{ github.event.inputs.receiver_1_name || 'rx_ground' }}

          - name: muninn-2
            dir: firmware/muninn
            is_receiver: true
            receiver_name: ${{ github.event.inputs.receiver_2_name || 'rx_upstairs' }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate config.h
        env:
          # Wi-Fi credentials — stored as GitHub Actions secrets.
          # If secrets are not set, placeholder values are used and the built
          # firmware will not connect to Wi-Fi until flashed with real config.
          WIFI_SSID: ${{ secrets.FIRMWARE_WIFI_SSID || 'YourNetworkSSID' }}
          WIFI_PASSWORD: ${{ secrets.FIRMWARE_WIFI_PASSWORD || 'YourNetworkPassword' }}
          AGGREGATOR_HOST: ${{ github.event.inputs.aggregator_host || vars.FIRMWARE_AGGREGATOR_HOST || 'csi-aggregator.home.arpa' }}
          RECEIVER_NAME: ${{ matrix.firmware.receiver_name }}
        run: |
          python3 - <<'PYEOF'
          import os

          wifi_ssid      = os.environ["WIFI_SSID"]
          wifi_password  = os.environ["WIFI_PASSWORD"]
          agg_host       = os.environ["AGGREGATOR_HOST"]
          receiver_name  = os.environ["RECEIVER_NAME"]

          config = f"""\
          // config.h — generated by CI (firmware workflow)
          // DO NOT EDIT — regenerated on every build.
          // To customise, edit firmware/config.h and rebuild locally,
          // or set FIRMWARE_WIFI_SSID / FIRMWARE_WIFI_PASSWORD secrets in GitHub.
          #pragma once

          // Wi-Fi
          #define WIFI_SSID           "{wifi_ssid}"
          #define WIFI_PASSWORD       "{wifi_password}"
          #define WIFI_MAX_RETRY      10

          // CSI channel
          #define CSI_WIFI_CHANNEL    6
          #define CSI_BANDWIDTH       WIFI_BW_HT40

          // Transmitter
          #define TX_BEACON_INTERVAL_MS   100
          #define TX_PACKET_SIZE          128

          // Receiver
          #define AGGREGATOR_HOST     "{agg_host}"
          #define AGGREGATOR_PORT     5005
          #define RECEIVER_NAME       "{receiver_name}"

          // Logging tags
          #define LOG_TAG_WIFI        "CSI_WIFI"
          #define LOG_TAG_CSI         "CSI_DATA"
          #define LOG_TAG_UDP         "CSI_UDP"
          """

          # Dedent — the heredoc adds leading spaces
          import textwrap
          with open("firmware/config.h", "w") as f:
              f.write(textwrap.dedent(config))

          print("Generated firmware/config.h")
          print(f"  WIFI_SSID:        {'(set)' if wifi_ssid != 'YourNetworkSSID' else '(placeholder)'}")
          print(f"  AGGREGATOR_HOST:  {agg_host}")
          print(f"  RECEIVER_NAME:    {receiver_name}")
          PYEOF

      - name: Build ${{ matrix.firmware.name }} firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release/v5.3
          target: esp32s3
          path: ${{ matrix.firmware.dir }}
          command: idf.py build

      - name: Create merged flash binary
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: release/v5.3
          target: esp32s3
          path: ${{ matrix.firmware.dir }}
          command: >
            python $IDF_PATH/components/esptool_py/esptool/esptool.py
            --chip esp32s3
            merge_bin
            --output build/merged-flash.bin
            @build/flash_args

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.firmware.name }}-firmware
          retention-days: 90
          path: |
            ${{ matrix.firmware.dir }}/build/merged-flash.bin
            ${{ matrix.firmware.dir }}/build/flash_args
            ${{ matrix.firmware.dir }}/build/bootloader/bootloader.bin
            ${{ matrix.firmware.dir }}/build/partition_table/partition-table.bin

  # ── Attach artifacts to a GitHub release when triggered from main ─────────
  attach-to-release:
    name: Attach firmware to latest release
    needs: build
    runs-on: ubuntu-latest
    # Only run on push (not workflow_dispatch) and only when triggered from main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest container release tag
        id: tag
        run: |
          TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "No release tag found — skipping attachment"
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all firmware artifacts
        if: steps.tag.outputs.found == 'true'
        uses: actions/download-artifact@v4
        with:
          path: firmware-artifacts/

      - name: Package firmware for release
        if: steps.tag.outputs.found == 'true'
        run: |
          cd firmware-artifacts
          for dir in */; do
            name="${dir%/}"
            if [ -f "$dir/merged-flash.bin" ]; then
              cp "$dir/merged-flash.bin" "../${name}-merged-flash.bin"
            fi
          done
          ls -lh ../*.bin 2>/dev/null || echo "No merged binaries found"

      - name: Attach firmware binaries to release
        if: steps.tag.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: "*-merged-flash.bin"
          fail_on_unmatched_files: false

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write       # create releases + tags
  packages: write       # push to GHCR

jobs:
  # ── Version calculation ────────────────────────────────────────────────────
  version:
    name: Calculate version
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.calc.outputs.release }}
      version: ${{ steps.calc.outputs.version }}
      changelog: ${{ steps.calc.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for tag inspection

      - name: Calculate next version
        id: calc
        run: |
          # Find the most recent v*.*.* tag
          LAST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            BASE_VERSION="v0.0.0"
            RANGE="HEAD"
            COMMITS=$(git log --oneline)
          else
            BASE_VERSION="$LAST_TAG"
            RANGE="${LAST_TAG}..HEAD"
            COMMITS=$(git log "$RANGE" --oneline)
          fi

          # Parse semver components
          MAJOR=$(echo "$BASE_VERSION" | sed 's/v\([0-9]*\)\..*/\1/')
          MINOR=$(echo "$BASE_VERSION" | sed 's/v[0-9]*\.\([0-9]*\)\..*/\1/')
          PATCH=$(echo "$BASE_VERSION" | sed 's/v[0-9]*\.[0-9]*\.\([0-9]*\).*/\1/')

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — use the requested bump type directly
            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac
          else
            if [ -z "$COMMITS" ]; then
              echo "No commits since $BASE_VERSION, skipping release"
              echo "release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Check for breaking changes first
            FULL_LOG=$(git log "$RANGE" --format="%B---COMMIT_SEP---")
            if echo "$FULL_LOG" | grep -q "BREAKING CHANGE"; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMITS" | grep -qE '^\S+ feat(\(.+\))?(!)?:'; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif echo "$COMMITS" | grep -qE '^\S+ (fix|chore)(\(.+\))?(!)?:'; then
              PATCH=$((PATCH + 1))
            else
              echo "No releasable commits (feat/fix/chore) since $BASE_VERSION, skipping"
              echo "release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "release=true"    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Build changelog from conventional commits since last tag
          CHANGELOG=$(git log "$RANGE" --pretty=format:"- %s" \
            | grep -E '^- (feat|fix|chore|docs|refactor|perf)' \
            || true)
          # GitHub output multiline escaping
          {
            echo "changelog<<CHANGELOG_EOF"
            echo "$CHANGELOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ── Resolve releasable services from the Helm chart ───────────────────────
  services:
    name: Resolve release services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.services.outputs.matrix }}
      list: ${{ steps.services.outputs.list }}

    steps:
      - uses: actions/checkout@v4

      - name: Read Helm image services
        id: services
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import os
          import re

          text = Path("bifrost/helm/grimnir/values.yaml").read_text(encoding="utf-8")
          match = re.search(r"^image:\n((?:  .*\n)+)", text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not find image: block in bifrost/helm/grimnir/values.yaml")

          services = []
          for line in match.group(1).splitlines():
              service = re.match(r"^  ([A-Za-z0-9_-]+):\s*$", line)
              if service:
                  services.append(service.group(1))

          if not services:
              raise SystemExit("No release services found in bifrost/helm/grimnir/values.yaml")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(services)}\n")
              fh.write(f"list={' '.join(services)}\n")
          PY

  # ── Build and push container images ───────────────────────────────────────
  images:
    name: Build images (${{ matrix.service }})
    needs: [version, services]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.services.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/dannysauer/grimnir/${{ matrix.service }}:${{ needs.version.outputs.version }}
            ghcr.io/dannysauer/grimnir/${{ matrix.service }}:latest
          labels: |
            org.opencontainers.image.title=grimnir-${{ matrix.service }}
            org.opencontainers.image.version=${{ needs.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/dannysauer/grimnir
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ── Create GitHub release + tag ────────────────────────────────────────────
  release:
    name: Create release
    needs: [version, services, images]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create git tag
        run: |
          git tag "${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - name: Generate release notes
        env:
          CHANGELOG: ${{ needs.version.outputs.changelog }}
          RELEASE_SERVICES: ${{ needs.services.outputs.list }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          {
            echo "## Changes"
            echo ""
            echo "$CHANGELOG"
            echo ""
            echo "## Container images"
            echo ""
            echo '```'
            for service in $RELEASE_SERVICES; do
              echo "ghcr.io/dannysauer/grimnir/${service}:${VERSION}"
            done
            echo '```'
            echo ""
            echo "## Helm chart"
            echo ""
            echo '```bash'
            echo "helm install grimnir oci://ghcr.io/dannysauer/charts/grimnir \\"
            echo "  --version <chart-version> \\"
            echo '  --set database.url="postgresql+asyncpg://user:pass@host:5432/csi"'
            echo '```'
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: ${{ needs.version.outputs.version }}
          body_path: release-notes.md

  # ── Trigger chart release with updated appVersion ─────────────────────────
  chart-release:
    name: Trigger chart release
    needs: [version, services, release]
    if: needs.version.outputs.release == 'true'
    uses: ./.github/workflows/chart-release.yml
    with:
      app_version: ${{ needs.version.outputs.version }}
      changelog: ${{ needs.version.outputs.changelog }}
      services: ${{ needs.services.outputs.list }}
    permissions:
      contents: write
      packages: write

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c10">
<title>CSI Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  /* ── Reset & base ───────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0d1520;
    --surface2:  #111d2e;
    --border:    #1a2d45;
    --accent:    #00d4ff;
    --accent2:   #00ff9d;
    --warn:      #ff6b35;
    --dim:       #3a5068;
    --text:      #c8dff0;
    --text-dim:  #4a6a88;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
    --nav-h:     56px;
    --safe-b:    env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); }

  .stream-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
  }
  .dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
  .dot.error { background: var(--warn); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

  #last-update { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

  /* ── Pages ──────────────────────────────────────────────────────────────── */
  #pages {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 14px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }

  /* ── Nav bar ────────────────────────────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-b);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 56px;
  }
  .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .nav-btn.active { color: var(--accent); }

  /* ── Section headers ────────────────────────────────────────────────────── */
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── Receiver cards ─────────────────────────────────────────────────────── */
  #receiver-grid { display: flex; flex-direction: column; gap: 10px; }

  .rx-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color .2s;
  }
  .rx-card.active  { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
  .rx-card.stale   { border-color: var(--border); opacity: .6; }
  .rx-card.offline { border-color: var(--border); opacity: .4; }

  .rx-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .rx-name { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .rx-loc  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .rx-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .rx-pill.live    { background: color-mix(in srgb, var(--accent2) 15%, transparent); color: var(--accent2); }
  .rx-pill.stale   { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); }
  .rx-pill.offline { background: color-mix(in srgb, var(--dim) 20%, transparent); color: var(--dim); }

  .rx-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--text-dim); }
  .stat-value { font-family: var(--mono); font-size: 14px; }
  .stat-value.good { color: var(--accent2); }
  .stat-value.warn { color: var(--warn); }

  .rx-bar-wrap { margin-top: 10px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .rx-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s ease; }

  /* ── Chart page ─────────────────────────────────────────────────────────── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .chart-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  canvas { width: 100% !important; }

  /* ── Heatmap page ───────────────────────────────────────────────────────── */
  .heatmap-select-wrap { margin-bottom: 12px; }

  select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px; /* prevent iOS zoom */
    padding: 10px 12px;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus { outline: none; border-color: var(--accent); }

  #heatmap-canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  #heatmap-canvas { display: block; width: 100%; image-rendering: pixelated; }

  .heatmap-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  /* ── Label page ─────────────────────────────────────────────────────────── */
  .label-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }

  input[type="text"], input[type="number"], input[type="datetime-local"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px; /* prevent iOS zoom */
    padding: 10px 12px;
    width: 100%;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: .8; }
  .btn.secondary {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--warn);
  }

  /* Quick-label buttons */
  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color .15s, color .15s;
    min-height: 44px;
  }
  .quick-btn:active, .quick-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Label list */
  .label-list { display: flex; flex-direction: column; gap: 8px; }
  .label-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .label-room { font-family: var(--mono); font-size: 13px; color: var(--accent2); }
  .label-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .label-del {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
    flex-shrink: 0; min-width: 32px; min-height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .label-del:active { color: var(--warn); }

  /* ── Label sub-tabs ─────────────────────────────────────────────────────── */
  .label-tabs {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .label-tab {
    flex: 1;
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 4px;
    cursor: pointer;
    transition: color .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .label-tab:last-child { border-right: none; }
  .label-tab.active {
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 8%, var(--surface2));
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Room grouping in live tab ──────────────────────────────────────────── */
  .floor-group { margin-bottom: 10px; }
  .floor-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-left: 2px;
  }

  /* ── Live-mode button variants ──────────────────────────────────────────── */
  .quick-btn.selected-green {
    border-color: var(--accent2);
    color: var(--accent2);
    background: color-mix(in srgb, var(--accent2) 10%, var(--surface2));
  }
  .btn.enter-btn {
    background: color-mix(in srgb, var(--accent2) 15%, var(--surface2));
    color: var(--accent2);
    border: 1px solid color-mix(in srgb, var(--accent2) 35%, var(--border));
    font-weight: 600;
  }
  .btn.enter-btn:disabled {
    opacity: .4;
    cursor: default;
  }
  .btn.leave-btn {
    background: var(--accent2);
    color: var(--bg);
    font-size: 17px;
    font-weight: 700;
    padding: 16px;
    min-height: 56px;
  }

  /* ── In-room status card ────────────────────────────────────────────────── */
  .in-room-card {
    background: color-mix(in srgb, var(--accent2) 7%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--accent2) 30%, var(--border));
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .in-room-header { display: flex; align-items: center; gap: 10px; }
  .in-room-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  .in-room-name { font-family: var(--mono); font-size: 18px; color: var(--accent2); flex: 1; }
  .in-room-since { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .in-room-occ   { font-family: var(--mono); font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

  /* ── Manage-rooms link ──────────────────────────────────────────────────── */
  .manage-rooms-link {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    cursor: pointer;
    padding: 4px;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .manage-rooms-link:hover { color: var(--accent); }

  /* ── Room manager modal ─────────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 12, 16, 0.85);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 80dvh;
    display: flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .25s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-title {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .modal-close {
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; padding: 4px 8px; line-height: 1;
  }
  .modal-close:hover { color: var(--warn); }
  .modal-body { overflow-y: auto; flex: 1; padding: 12px 16px; }
  .modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }

  /* ── Room manager list items ────────────────────────────────────────────── */
  .room-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .room-item:last-child { border-bottom: none; }
  .room-name-display {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent2);
    flex: 1;
    cursor: pointer;
  }
  .room-name-display:hover { text-decoration: underline; text-underline-offset: 3px; }
  .room-floor-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
  .room-del-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; padding: 4px 6px;
    min-width: 28px; min-height: 28px; flex-shrink: 0;
  }
  .room-del-btn:active { color: var(--warn); }

  /* ── Empty states ───────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 32px 0;
  }

  /* ── Toast ──────────────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    padding: 8px 16px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Desktop responsive layout ────────────────────────────────────────── */
  @media (min-width: 768px) {
    html, body { font-size: 16px; }

    header { padding: 12px 28px; }
    .logo { font-size: 16px; }
    .page { padding: 20px 28px; }

    #receiver-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }

    .nav-btn { font-size: 11px; min-height: 60px; }
    .nav-btn svg { width: 22px; height: 22px; }
  }

  @media (min-width: 1200px) {
    .page { padding: 28px max(32px, calc((100% - 1440px) / 2)); }

    #receiver-grid { grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); }

    #page-chart.active {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-content: start;
    }
    #page-chart .chart-wrap { margin-bottom: 0; }
  }

  /* ── SSE error banner ───────────────────────────────────────────────────── */
  #error-banner {
    display: none;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 7px 16px;
    background: color-mix(in srgb, var(--warn) 12%, var(--surface));
    border-bottom: 1px solid var(--warn);
    font-family: var(--mono);
    font-size: 12px;
    color: var(--warn);
  }
  #error-banner.visible { display: flex; }
  #error-banner button {
    background: none;
    border: 1px solid var(--warn);
    color: var(--warn);
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
  }
  #error-banner button:hover { background: color-mix(in srgb, var(--warn) 15%, transparent); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">CSI<span>//</span>MONITOR</div>
    <div id="last-update" style="flex:1;text-align:center"></div>
    <div id="rx-summary" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap"></div>
    <div class="stream-badge">
      <div class="dot" id="stream-dot"></div>
      <span id="stream-label">connecting</span>
    </div>
  </header>

  <!-- SSE error banner -->
  <div id="error-banner">
    <span id="error-msg">Stream disconnected</span>
    <button onclick="reconnectNow()">reconnect now</button>
  </div>

  <!-- Pages -->
  <div id="pages">

    <!-- LIVE page -->
    <div class="page active" id="page-live">
      <div class="section-title">Receivers</div>
      <div id="receiver-grid"><div class="empty">waiting for data…</div></div>
    </div>

    <!-- CHART page -->
    <div class="page" id="page-chart">
      <div class="chart-wrap">
        <div class="chart-label">RSSI · 60 min</div>
        <canvas id="rssi-chart" height="200"></canvas>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">σ RSSI variance · 60 min</div>
        <canvas id="var-chart" height="160"></canvas>
      </div>
    </div>

    <!-- HEATMAP page -->
    <div class="page" id="page-heatmap">
      <div class="heatmap-select-wrap">
        <select id="heatmap-rx"><option value="">— select receiver —</option></select>
      </div>
      <div id="heatmap-canvas-wrap">
        <canvas id="heatmap-canvas" height="120"></canvas>
        <div class="heatmap-meta" id="heatmap-meta">no data</div>
      </div>
    </div>

    <!-- LABEL page -->
    <div class="page" id="page-label">

      <!-- Sub-tab bar -->
      <div class="label-tabs">
        <button class="label-tab active" id="tab-btn-live" onclick="switchLabelTab('live')">Live</button>
        <button class="label-tab" id="tab-btn-timestamp" onclick="switchLabelTab('timestamp')">Timestamp</button>
      </div>

      <!-- LIVE panel ──────────────────────────────────────────────────────── -->
      <div class="tab-panel active" id="tab-live">

        <!-- idle: room selection -->
        <div id="live-idle">
          <div class="label-form">
            <div class="section-title">Enter a Room</div>
            <div id="live-room-groups"><div class="empty" style="padding:12px 0">loading rooms…</div></div>
            <div class="field">
              <label>OCCUPANTS</label>
              <input type="number" id="live-occupants" value="1" min="0" max="20">
            </div>
            <div class="field">
              <label>NOTES (optional)</label>
              <textarea id="live-notes-idle" placeholder="e.g. watching TV, cooking…"></textarea>
            </div>
            <button class="btn enter-btn" id="live-enter-btn" onclick="enterRoom()" disabled>
              Select a room above ↑
            </button>
          </div>
        </div>

        <!-- active: in-room card -->
        <div id="live-active" style="display:none">
          <div class="in-room-card">

<div id="toast"></div>

<script>
'use strict';

const API = window.location.origin;

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function timeAgo(isoStr) {
  if (!isoStr) return 'never';
  const s = Math.floor((Date.now() - new Date(isoStr)) / 1000);
  if (s < 60)   return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60)   return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24)   return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

// ── State ─────────────────────────────────────────────────────────────────────
const receivers = {};        // id → merged receiver (history + SSE); _live flag set by SSE
const rssiHistory = {};      // name → [{x, y}]
const varHistory = {};       // name → [{x, y}]
let rssiChart = null;
let varChart = null;
let selectedHeatmapRx = null;
let historyLoaded = false;
let heatmapTimer = null;

// ── Status helpers ─────────────────────────────────────────────────────────────
const STALE_MS       = 12_000;
const OFFLINE_DAYS_MS = 60 * 24 * 60 * 60 * 1000;

const isOffline = rx => rx._live === false;
const isStale   = rx => !isOffline(rx) && (!rx.last_seen || (Date.now() - new Date(rx.last_seen)) > STALE_MS);
const getStatus = rx => isOffline(rx) ? 'offline' : isStale(rx) ? 'stale' : 'live';

function sortedReceivers() {
  return Object.values(receivers).sort((a, b) => {
    const roleRank = r => r.role === 'transmitter' ? 1 : 0;
    const rd = roleRank(a) - roleRank(b);
    if (rd !== 0) return rd;
    const liveRank = r => isOffline(r) ? 1 : 0;
    const ld = liveRank(a) - liveRank(b);
    if (ld !== 0) return ld;
    return (a.name ?? '').localeCompare(b.name ?? '');
  });
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btn.dataset.page).classList.add('active');
  btn.classList.add('active');
}

// ── SSE stream ────────────────────────────────────────────────────────────────
let _sseBackoff = 1000;   // ms; doubles on each failure, caps at 30 s
let _sseTimer   = null;
let _sseEs      = null;

function connectStream() {
  if (_sseTimer) { clearTimeout(_sseTimer); _sseTimer = null; }
  if (_sseEs)    { _sseEs.close(); _sseEs = null; }

  const dot    = document.getElementById('stream-dot');
  const lbl    = document.getElementById('stream-label');
  const banner = document.getElementById('error-banner');
  const errMsg = document.getElementById('error-msg');

  const es = new EventSource(`${API}/api/stream`);
  _sseEs = es;

  es.onopen = () => {
    dot.className = 'dot live';
    lbl.textContent = 'live';
    banner.classList.remove('visible');
    _sseBackoff = 1000;
  };

  es.onerror = () => {
    dot.className = 'dot error';
    es.close();
    _sseEs = null;

    const secs = Math.round(_sseBackoff / 1000);
    lbl.textContent = `reconnecting in ${secs}s…`;
    errMsg.textContent = `Stream disconnected — reconnecting in ${secs}s`;
    banner.classList.add('visible');

    _sseTimer = setTimeout(connectStream, _sseBackoff);
    _sseBackoff = Math.min(_sseBackoff * 2, 30000);
  };

  es.onmessage = e => {
    const d = JSON.parse(e.data);
    onStreamUpdate(d);
    document.getElementById('last-update').textContent =
      new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };
}

function reconnectNow() {
  _sseBackoff = 1000;
  connectStream();
}

function onStreamUpdate(data) {
  const liveIds = new Set(data.receivers.map(rx => rx.id));

  for (const rx of data.receivers) {
    receivers[rx.id] = { ...receivers[rx.id], ...rx, _live: true };

    if (!rssiHistory[rx.name]) rssiHistory[rx.name] = [];
    if (!varHistory[rx.name])  varHistory[rx.name]  = [];

    if (rx.avg_rssi != null) {
      rssiHistory[rx.name].push({ x: data.timestamp, y: rx.avg_rssi });
      if (rssiHistory[rx.name].length > 120) rssiHistory[rx.name].shift();
    }
    if (rx.stddev_rssi != null) {
      varHistory[rx.name].push({ x: data.timestamp, y: rx.stddev_rssi });
      if (varHistory[rx.name].length > 120) varHistory[rx.name].shift();
    }
  }

  // Mark receivers not in this update as offline
  for (const id of Object.keys(receivers)) {
    if (!liveIds.has(parseInt(id))) {
      receivers[id] = { ...receivers[id], _live: false };
    }
  }

  const sorted = sortedReceivers();
  renderCards(sorted);
  updateRxSummary(sorted);
  updateCharts();
  syncHeatmapSelector(sorted);

  if (!historyLoaded && data.receivers.length > 0) {
    historyLoaded = true;
    loadHistory();
  }
}

// ── Receiver summary (header) ─────────────────────────────────────────────────
function updateRxSummary(rxList) {
  const live  = rxList.filter(rx => getStatus(rx) === 'live').length;
  const total = rxList.length;
  const el = document.getElementById('rx-summary');
  if (total === 0) { el.textContent = ''; return; }
  el.textContent = `${live}/${total} live`;
  el.style.color = live === total ? 'var(--accent2)' : live === 0 ? 'var(--warn)' : 'var(--text-dim)';
}

// ── Receiver cards ────────────────────────────────────────────────────────────
function renderCards(rxList) {
  const grid = document.getElementById('receiver-grid');
  if (!rxList.length) { grid.innerHTML = '<div class="empty">no receivers</div>'; return; }

  const emptyEl = grid.querySelector('.empty');
  if (emptyEl) grid.innerHTML = '';

  for (const rx of rxList) {
    let card = document.getElementById(`rxc-${rx.id}`);
    if (!card) {
      card = document.createElement('div');
      card.id = `rxc-${rx.id}`;
      card.className = 'rx-card';
      grid.appendChild(card);
    }

    const status = getStatus(rx);
    card.className = `rx-card ${status}`;

    const rssi    = rx.avg_rssi != null ? rx.avg_rssi.toFixed(1) : '—';
    const rssiCls = rx.avg_rssi != null ? (rx.avg_rssi > -65 ? 'good' : rx.avg_rssi < -80 ? 'warn' : '') : '';
    const stddev  = rx.stddev_rssi != null ? rx.stddev_rssi.toFixed(2) : '—';
    const varPct  = rx.stddev_rssi != null ? Math.min(100, rx.stddev_rssi / 5 * 100) : 0;
    const seenStr = status === 'offline'
      ? timeAgo(rx.last_seen)
      : (rx.last_seen ? Math.round((Date.now() - new Date(rx.last_seen)) / 1000) + 's ago' : 'never');
    const roleTag = rx.role === 'transmitter' ? ' · tx' : '';

    card.innerHTML = `
      <div class="rx-header">
        <div>
          <div class="rx-name">${escHtml(rx.name)}</div>
          <div class="rx-loc">floor ${escHtml(rx.floor ?? '?')} · ${escHtml(rx.location ?? '—')}${roleTag}</div>
        </div>
        <div class="rx-pill ${status}">${status}</div>
      </div>
      <div class="rx-stats">
        <div class="stat">
          <div class="stat-label">RSSI</div>
          <div class="stat-value ${rssiCls}">${rssi}<small style="font-size:10px"> dBm</small></div>
        </div>
        <div class="stat">
          <div class="stat-label">σ RSSI</div>
          <div class="stat-value">${stddev}</div>
        </div>
        <div class="stat">
          <div class="stat-label">seen</div>
          <div class="stat-value" style="font-size:11px">${seenStr}</div>
        </div>
      </div>
      <div class="rx-bar-wrap"><div class="rx-bar" style="width:${varPct}%"></div></div>
    `;
  }

  // Re-sort cards in DOM to match sorted rxList (appendChild moves existing nodes)
  for (const rx of rxList) {
    const card = document.getElementById(`rxc-${rx.id}`);
    if (card) grid.appendChild(card);
  }

  // Remove cards for receivers no longer tracked
  const ids = new Set(rxList.map(rx => String(rx.id)));
  for (const card of [...grid.querySelectorAll('.rx-card')]) {
    if (!ids.has(card.id.replace('rxc-', ''))) card.remove();
  }
}

// ── Charts ────────────────────────────────────────────────────────────────────
const PALETTE = ['#00d4ff', '#00ff9d', '#ff6b35', '#c77dff', '#ffd166', '#ef476f'];

function chartDefaults(yLabel) {
  return {
    type: 'line',
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#4a6a88', font: { size: 10 }, boxWidth: 10 } } },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
          ticks: { color: '#4a6a88', font: { size: 9 }, maxTicksLimit: 6 },
          grid: { color: '#1a2d45' },
        },
        y: {
          ticks: { color: '#4a6a88', font: { size: 9 } },
          grid: { color: '#1a2d45' },
          title: { display: false },
        },
      },
    },
  };
}

function initCharts() {
  const rssiCtx = document.getElementById('rssi-chart').getContext('2d');
  const varCtx  = document.getElementById('var-chart').getContext('2d');
  rssiChart = new Chart(rssiCtx, chartDefaults('dBm'));
  varChart  = new Chart(varCtx,  chartDefaults('σ'));
}

function updateCharts() {
  if (!rssiChart || !varChart) return;
  const rxList = Object.values(receivers);

  rssiChart.data.datasets = rxList
    .filter(rx => rssiHistory[rx.name]?.length)
    .map((rx, i) => ({
      label: rx.name,
      data: rssiHistory[rx.name],
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    }));

  varChart.data.datasets = rxList
    .filter(rx => varHistory[rx.name]?.length)
    .map((rx, i) => ({
      label: rx.name,
      data: varHistory[rx.name],
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    }));

  rssiChart.update('none');
  varChart.update('none');
}

async function loadHistory() {
  for (const [i, rx] of Object.values(receivers).entries()) {
    try {
      const res = await fetch(`${API}/api/history/variance?receiver_id=${rx.id}&minutes=60`);
      if (!res.ok) continue;
      const rows = await res.json();
      rssiHistory[rx.name] = rows.map(r => ({ x: r.time, y: r.avg_rssi })).filter(p => p.y != null);
      varHistory[rx.name]  = rows.map(r => ({ x: r.time, y: r.stddev_rssi })).filter(p => p.y != null);
    } catch (_) {}
  }
  updateCharts();
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function syncHeatmapSelector(rxList) {
  const sel = document.getElementById('heatmap-rx');
  const existing = new Set([...sel.options].map(o => o.value));
  for (const rx of rxList) {
    if (rx.role !== 'receiver') continue;
    if (!existing.has(String(rx.id))) {
      const opt = document.createElement('option');
      opt.value = rx.id;
      opt.textContent = isOffline(rx) ? `${rx.name} (offline)` : rx.name;
      sel.appendChild(opt);
    }
  }
}

document.getElementById('heatmap-rx').addEventListener('change', function() {
  selectedHeatmapRx = this.value ? parseInt(this.value) : null;
  if (selectedHeatmapRx) fetchHeatmap(selectedHeatmapRx);
});

async function fetchHeatmap(rxId) {
  try {
    const res = await fetch(`${API}/api/history/snapshot?receiver_id=${rxId}&limit=1`);
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows.length) return;
    drawHeatmap(rows[0]);
  } catch (_) {}
}

function drawHeatmap(sample) {
  const canvas = document.getElementById('heatmap-canvas');
  const meta   = document.getElementById('heatmap-meta');
  const amp    = sample.amplitude;
  const n      = amp.length;
  if (!n) return;

  const cols = sample.subcarrier_count || n;
  const rows = sample.antenna_count    || 1;

  canvas.width  = cols;
  canvas.height = rows;

  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(cols, rows);

  const mn = Math.min(...amp);
  const mx = Math.max(...amp);
  const rng = mx - mn || 1;

  for (let i = 0; i < amp.length; i++) {
    const t = (amp[i] - mn) / rng; // 0..1
    // Map to cyan-green gradient matching theme
    const r = Math.round(t * 0);
    const g = Math.round(80 + t * 175);
    const b = Math.round(255 - t * 100);
    img.data[i * 4 + 0] = r;
    img.data[i * 4 + 1] = g;
    img.data[i * 4 + 2] = b;
    img.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);

  const t = new Date(sample.time);
  meta.innerHTML = `
    <span>${cols} subcarriers · ${rows} antenna${rows > 1 ? 's' : ''}</span>
    <span>RSSI ${sample.rssi} dBm</span>
    <span>${t.toLocaleTimeString()}</span>
    ${sample.label ? `<span style="color:var(--accent2)">${escHtml(sample.label)}</span>` : ''}
  `;
}

// Refresh heatmap every 2s when on heatmap page
setInterval(() => {
  if (selectedHeatmapRx && document.getElementById('page-heatmap').classList.contains('active')) {
    fetchHeatmap(selectedHeatmapRx);
  }
}, 2000);

// ── Labels ────────────────────────────────────────────────────────────────────

// ── Rooms state ───────────────────────────────────────────────────────────────
let knownRooms    = [];
let liveRoom      = null;   // selected room name or null
let liveEnterTime = null;   // Date when user entered, or null
let liveElapsedId = null;   // setInterval handle for elapsed ticker
let _editingRoom  = null;   // room name being renamed in the manager

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchLabelTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.label-tab').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`tab-btn-${tab}`).classList.add('active');
}

// ── Room display helpers ──────────────────────────────────────────────────────
function displayRoomName(name) {
  // snake_case → Title Case for button labels (e.g. living_room → Living Room)
  return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function groupRoomsByFloor(rooms) {
  const groups = {};
  for (const r of rooms) {
    if (!groups[r.floor]) groups[r.floor] = [];
    groups[r.floor].push(r);
  }
  return groups;
}

function floorLabel(f) {
  return f === 0 ? 'Ground floor' : f === 1 ? 'Upper floor' : `Floor ${f}`;
}

// ── Load rooms from API ───────────────────────────────────────────────────────
async function loadRooms() {
  try {
    const res = await fetch(`${API}/api/rooms`);
    if (!res.ok) return;
    knownRooms = await res.json();
  } catch (_) {
    knownRooms = [];
  }
  renderLiveRoomButtons();
  renderTimestampRoomPicker();
}

function renderLiveRoomButtons() {
  const container = document.getElementById('live-room-groups');
  if (!container) return;
  if (!knownRooms.length) {
    container.innerHTML = '<div class="empty" style="padding:12px 0">no rooms — add via manage rooms</div>';
    return;
  }
  const groups = groupRoomsByFloor(knownRooms);
  container.innerHTML = Object.entries(groups).map(([floor, rooms]) => `
    <div class="floor-group">
      <div class="floor-label">${escHtml(floorLabel(parseInt(floor)))}</div>
      <div class="quick-btns">
        ${rooms.map(r => `
          <button class="quick-btn${liveRoom === r.name ? ' selected-green' : ''}"
                  onclick="selectLiveRoom('${escHtml(r.name)}', this)">
            ${escHtml(displayRoomName(r.name))}
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderTimestampRoomPicker() {
  // Quick buttons
  const btns = document.getElementById('ts-room-btns');
  if (btns) {
    btns.innerHTML = knownRooms.map(r => `
      <button class="quick-btn" data-room="${escHtml(r.name)}"
              onclick="quickRoomTs(this,'${escHtml(r.name)}')">
        ${escHtml(displayRoomName(r.name))}
      </button>
    `).join('');
  }
  // Select with optgroups per floor
  const sel = document.getElementById('ts-room-select');
  if (!sel) return;
  const current = sel.value;
  const groups  = groupRoomsByFloor(knownRooms);
  sel.innerHTML = '<option value="">— select room —</option>' +
    Object.entries(groups).map(([floor, rooms]) =>
      `<optgroup label="${escHtml(floorLabel(parseInt(floor)))}">` +
      rooms.map(r =>
        `<option value="${escHtml(r.name)}"${r.name === current ? ' selected' : ''}>${escHtml(r.name)}</option>`
      ).join('') +
      '</optgroup>'
    ).join('');
}

// ── Live mode state machine ───────────────────────────────────────────────────
function selectLiveRoom(name, _el) {
  liveRoom = name;
  renderLiveRoomButtons();   // re-render to show selection highlight
  const btn = document.getElementById('live-enter-btn');
  if (btn) {
    btn.disabled   = false;
    btn.textContent = `Enter ${displayRoomName(name)} →`;
  }
}

function enterRoom() {
  if (!liveRoom) { toast('Select a room first', 'warn'); return; }
  liveEnterTime = new Date();

  document.getElementById('live-idle').style.display   = 'none';
  document.getElementById('live-active').style.display = 'block';
  document.getElementById('live-active-room').textContent = displayRoomName(liveRoom);
  document.getElementById('live-since-time').textContent  =
    liveEnterTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('live-active-occ').textContent  =
    `${document.getElementById('live-occupants').value} occ`;

  if (liveElapsedId) clearInterval(liveElapsedId);
  liveElapsedId = setInterval(updateElapsed, 1000);
  updateElapsed();
}

function updateElapsed() {
  if (!liveEnterTime) return;
  const sec = Math.floor((Date.now() - liveEnterTime) / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const el = document.getElementById('live-elapsed');
  if (el) el.textContent = m > 0 ? `${m}m ${String(s).padStart(2, '0')}s` : `${s}s`;
}

async function leaveRoom() {
  if (!liveRoom || !liveEnterTime) return;
  const time_start = liveEnterTime.toISOString();
  const time_end   = new Date().toISOString();
  const occupants  = parseInt(document.getElementById('live-occupants').value, 10) || 1;
  const notes      = document.getElementById('live-notes-active').value.trim() || null;

  try {
    const res = await fetch(`${API}/api/labels`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room: liveRoom, time_start, time_end, occupants, notes }),
    });
    if (!res.ok) {
      const err = await res.json();
      toast(JSON.stringify(err.detail ?? err), 'warn');
      return;
    }
    toast(`${displayRoomName(liveRoom)} logged`, 'ok');
    resetLiveState();
    loadLabels();
  } catch (_) {
    toast('Network error', 'warn');
  }
}

function cancelEntry() {
  resetLiveState();
  toast('Discarded', 'ok');
}

function resetLiveState() {
  if (liveElapsedId) { clearInterval(liveElapsedId); liveElapsedId = null; }
  liveRoom      = null;
  liveEnterTime = null;
  const idle   = document.getElementById('live-idle');
  const active = document.getElementById('live-active');
  if (idle)   idle.style.display   = '';
  if (active) active.style.display = 'none';
  const notesActive = document.getElementById('live-notes-active');
  const occ         = document.getElementById('live-occupants');
  const enterBtn    = document.getElementById('live-enter-btn');
  if (notesActive) notesActive.value = '';
  if (occ)         occ.value        = '1';
  if (enterBtn)    { enterBtn.disabled = true; enterBtn.textContent = 'Select a room above ↑'; }
  renderLiveRoomButtons();
}

// ── Timestamp tab ─────────────────────────────────────────────────────────────
function quickRoomTs(btn, room) {
  document.querySelectorAll('#ts-room-btns .quick-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('ts-room-select').value = room;
}

function syncTsRoomBtns(value) {
  document.querySelectorAll('#ts-room-btns .quick-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.room === value);
  });
}

function setLastN(minutes) {
  const now   = new Date();
  const start = new Date(now - minutes * 60_000);
  document.getElementById('label-end').value   = toLocalDT(now);
  document.getElementById('label-start').value = toLocalDT(start);
}

function toLocalDT(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function submitLabel() {
  const room      = document.getElementById('ts-room-select').value;
  const startRaw  = document.getElementById('label-start').value;
  const endRaw    = document.getElementById('label-end').value;
  const occupantsRaw = parseInt(document.getElementById('label-occupants').value, 10);
  const occupants = Number.isNaN(occupantsRaw) ? 1 : occupantsRaw;
  const notes     = document.getElementById('label-notes').value.trim() || null;

  if (!room)     { toast('Room is required', 'warn'); return; }
  if (!startRaw) { toast('Start time required', 'warn'); return; }
  if (!endRaw)   { toast('End time required', 'warn'); return; }

  const time_start = new Date(startRaw).toISOString();
  const time_end   = new Date(endRaw).toISOString();

  try {
    const res = await fetch(`${API}/api/labels`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room, time_start, time_end, occupants, notes }),
    });
    if (!res.ok) {
      const err = await res.json();
      toast(JSON.stringify(err.detail ?? err), 'warn');
      return;
    }
    toast(`"${displayRoomName(room)}" saved`, 'ok');
    document.getElementById('label-notes').value = '';
    document.getElementById('ts-room-select').value = '';
    document.querySelectorAll('#ts-room-btns .quick-btn').forEach(b => b.classList.remove('selected'));
    loadLabels();
  } catch (_) {
    toast('Network error', 'warn');
  }
}

async function loadLabels() {
  try {
    const res = await fetch(`${API}/api/labels?minutes=480`);
    if (!res.ok) return;
    renderLabels(await res.json());
  } catch (_) {}
}

function renderLabels(labels) {
  const list = document.getElementById('label-list');
  if (!labels.length) { list.innerHTML = '<div class="empty">no labels yet</div>'; return; }
  list.innerHTML = labels.map(l => {
    const s   = new Date(l.time_start).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const e   = new Date(l.time_end).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const day = new Date(l.time_start).toLocaleDateString([], { month: 'short', day: 'numeric' });
    return `
      <div class="label-item">
        <div>
          <div class="label-room">${escHtml(displayRoomName(l.room))} · ${escHtml(l.occupants)} occ</div>
          <div class="label-time">${escHtml(day)} ${escHtml(s)} – ${escHtml(e)}${l.notes ? ' · ' + escHtml(l.notes) : ''}</div>
        </div>
        <button class="label-del" onclick="deleteLabel(${parseInt(l.id)})" title="Delete">✕</button>
      </div>
    `;
  }).join('');
}

async function deleteLabel(id) {
  try {
    const res = await fetch(`${API}/api/labels/${id}`, { method: 'DELETE' });
    if (res.ok) { toast('Label deleted', 'ok'); loadLabels(); }
  } catch (_) {}
}

// ── Room manager modal ────────────────────────────────────────────────────────
function openRoomManager() {
  _editingRoom = null;
  document.getElementById('room-modal').classList.add('open');
  loadRoomManager();
}

function closeRoomManager() {
  document.getElementById('room-modal').classList.remove('open');
}

async function loadRoomManager() {
  try {
    const res = await fetch(`${API}/api/rooms`);
    if (!res.ok) return;
    knownRooms = await res.json();
  } catch (_) {}
  renderRoomManager();
  renderLiveRoomButtons();
  renderTimestampRoomPicker();
}

function renderRoomManager() {
  const list = document.getElementById('room-manager-list');
  if (!list) return;
  if (!knownRooms.length) {
    list.innerHTML = '<div class="empty">no rooms yet — add one below</div>';
    return;
  }
  const groups = groupRoomsByFloor(knownRooms);
  list.innerHTML = Object.entries(groups).map(([floor, rooms]) => `
    <div style="margin-bottom:14px">
      <div class="floor-label">${escHtml(floorLabel(parseInt(floor)))}</div>
      ${rooms.map(r => {
        const isEditing = (r.name === _editingRoom);
        const nameCell = isEditing
          ? `<input id="room-edit-input" value="${escHtml(r.name)}"
                    style="flex:1;font-family:var(--mono);font-size:13px;padding:4px 6px;
                           background:var(--surface2);border:1px solid var(--accent);
                           border-radius:4px;color:var(--text);min-width:0">
             <button onclick="saveRoomName('${escHtml(r.name)}')"
                     style="background:var(--accent);color:var(--bg);border:none;border-radius:4px;
                            padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0">
               save
             </button>
             <button onclick="cancelEditRoom()"
                     style="background:none;border:1px solid var(--border);color:var(--text-dim);
                            border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer;flex-shrink:0">
               ✕
             </button>`
          : `<span class="room-name-display" title="click to rename"
                   onclick="editRoomName('${escHtml(r.name)}')">
               ${escHtml(r.name)}
             </span>`;
        return `
          <div class="room-item">
            ${nameCell}
            <span class="room-floor-label">fl.</span>
            <input type="number" value="${r.floor}" min="0" max="99"
                   onchange="updateRoomFloor('${escHtml(r.name)}',this.value)"
                   style="width:48px;padding:4px 6px;font-family:var(--mono);font-size:13px;
                          text-align:center;background:var(--surface2);border:1px solid var(--border);
                          border-radius:4px;color:var(--text)">
            ${isEditing ? '' : `<button class="room-del-btn" onclick="deleteRoom('${escHtml(r.name)}')">✕</button>`}
          </div>
        `;
      }).join('')}
    </div>
  `).join('');

  if (_editingRoom) {
    setTimeout(() => {
      const inp = document.getElementById('room-edit-input');
      if (inp) { inp.focus(); inp.select(); }
    }, 0);
  }
}

function editRoomName(name) {
  _editingRoom = name;
  renderRoomManager();
}

function cancelEditRoom() {
  _editingRoom = null;
  renderRoomManager();
}

async function saveRoomName(oldName) {
  const input = document.getElementById('room-edit-input');
  if (!input) return;
  const newName = input.value.trim();
  if (!newName)          { toast('Name cannot be empty', 'warn'); return; }
  if (newName === oldName) { cancelEditRoom(); return; }

  try {
    const res = await fetch(`${API}/api/rooms/${encodeURIComponent(oldName)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName }),
    });
    if (!res.ok) { toast((await res.json()).detail ?? 'Error', 'warn'); return; }
    toast(`Renamed to "${newName}"`, 'ok');
    _editingRoom = null;
    await loadRoomManager();
  } catch (_) { toast('Network error', 'warn'); }
}

async function updateRoomFloor(name, floor) {
  const f = parseInt(floor, 10);
  if (Number.isNaN(f)) return;
  try {
    const res = await fetch(`${API}/api/rooms/${encodeURIComponent(name)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ floor: f }),
    });
    if (!res.ok) { toast((await res.json()).detail ?? 'Error', 'warn'); return; }
    await loadRoomManager();
  } catch (_) { toast('Network error', 'warn'); }
}

async function addRoom() {
  const name  = document.getElementById('new-room-name').value.trim();
  const floor = parseInt(document.getElementById('new-room-floor').value, 10) || 0;
  if (!name) { toast('Room name required', 'warn'); return; }
  try {
    const res = await fetch(`${API}/api/rooms`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, floor }),
    });
    if (!res.ok) { toast((await res.json()).detail ?? 'Error', 'warn'); return; }
    toast(`"${name}" added`, 'ok');
    document.getElementById('new-room-name').value = '';
    await loadRoomManager();
  } catch (_) { toast('Network error', 'warn'); }
}

async function deleteRoom(name) {
  try {
    const res = await fetch(`${API}/api/rooms/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (res.status === 409) { toast((await res.json()).detail ?? 'Room in use', 'warn'); return; }
    if (!res.ok)            { toast('Error deleting room', 'warn'); return; }
    toast(`"${name}" deleted`, 'ok');
    await loadRoomManager();
  } catch (_) { toast('Network error', 'warn'); }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = type === 'warn' ? 'var(--warn)' : 'var(--accent2)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Discover all known probes at startup ──────────────────────────────────────
async function loadAllReceivers() {
  try {
    const res = await fetch(`${API}/api/history/receivers`);
    if (!res.ok) return;
    const list = await res.json();
    const cutoff = Date.now() - OFFLINE_DAYS_MS;
    for (const rx of list) {
      const lastSeenMs = rx.last_seen ? new Date(rx.last_seen).getTime() : 0;
      // Include active receivers always; include inactive if seen within 60 days
      if (rx.active || lastSeenMs > cutoff) {
        if (!receivers[rx.id]) {
          receivers[rx.id] = { ...rx, _live: false };
        }
      }
    }
    const sorted = sortedReceivers();
    renderCards(sorted);
    updateRxSummary(sorted);
    syncHeatmapSelector(sorted);
  } catch (_) {}
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initCharts();
loadAllReceivers();
connectStream();
loadRooms();
loadLabels();
setInterval(loadLabels, 30_000);

// Pre-fill timestamp tab end time to now when label page is first opened
document.querySelector('[data-page="page-label"]').addEventListener('click', () => {
  if (!document.getElementById('label-end').value) {
    document.getElementById('label-end').value = toLocalDT(new Date());
  }
});
</script>

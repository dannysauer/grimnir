<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080c10">
<title>CSI Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  /* ── Reset & base ───────────────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080c10;
    --surface:   #0d1520;
    --surface2:  #111d2e;
    --border:    #1a2d45;
    --accent:    #00d4ff;
    --accent2:   #00ff9d;
    --warn:      #ff6b35;
    --dim:       #3a5068;
    --text:      #c8dff0;
    --text-dim:  #4a6a88;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow', sans-serif;
    --nav-h:     56px;
    --safe-b:    env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Layout ─────────────────────────────────────────────────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); }

  .stream-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--dim);
    flex-shrink: 0;
  }
  .dot.live { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
  .dot.error { background: var(--warn); }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }

  #last-update { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }

  /* ── Pages ──────────────────────────────────────────────────────────────── */
  #pages {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .page {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 14px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  .page.active { display: block; }

  /* ── Nav bar ────────────────────────────────────────────────────────────── */
  nav {
    flex-shrink: 0;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-b);
  }

  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 4px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color .15s;
    -webkit-tap-highlight-color: transparent;
    min-height: 56px;
  }
  .nav-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .nav-btn.active { color: var(--accent); }

  /* ── Section headers ────────────────────────────────────────────────────── */
  .section-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── Receiver cards ─────────────────────────────────────────────────────── */
  #receiver-grid { display: flex; flex-direction: column; gap: 10px; }

  .rx-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    transition: border-color .2s;
  }
  .rx-card.active { border-color: color-mix(in srgb, var(--accent) 30%, var(--border)); }
  .rx-card.stale  { border-color: var(--border); opacity: .6; }

  .rx-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
  .rx-name { font-family: var(--mono); font-size: 13px; color: var(--accent); }
  .rx-loc  { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .rx-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .rx-pill.live  { background: color-mix(in srgb, var(--accent2) 15%, transparent); color: var(--accent2); }
  .rx-pill.stale { background: color-mix(in srgb, var(--warn) 12%, transparent); color: var(--warn); }

  .rx-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 10px; color: var(--text-dim); }
  .stat-value { font-family: var(--mono); font-size: 14px; }
  .stat-value.good { color: var(--accent2); }
  .stat-value.warn { color: var(--warn); }

  .rx-bar-wrap { margin-top: 10px; height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .rx-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s ease; }

  /* ── Chart page ─────────────────────────────────────────────────────────── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .chart-label { font-family: var(--mono); font-size: 11px; color: var(--text-dim); margin-bottom: 10px; }
  canvas { width: 100% !important; }

  /* ── Heatmap page ───────────────────────────────────────────────────────── */
  .heatmap-select-wrap { margin-bottom: 12px; }

  select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px; /* prevent iOS zoom */
    padding: 10px 12px;
    appearance: none;
    -webkit-appearance: none;
  }
  select:focus { outline: none; border-color: var(--accent); }

  #heatmap-canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  #heatmap-canvas { display: block; width: 100%; image-rendering: pixelated; }

  .heatmap-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
  }

  /* ── Label page ─────────────────────────────────────────────────────────── */
  .label-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }

  input[type="text"], input[type="number"], input[type="datetime-local"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px; /* prevent iOS zoom */
    padding: 10px 12px;
    width: 100%;
    transition: border-color .15s;
  }
  input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 60px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    transition: opacity .15s;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: .8; }
  .btn.secondary {
    background: transparent;
    color: var(--warn);
    border: 1px solid var(--warn);
  }

  /* Quick-label buttons */
  .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: border-color .15s, color .15s;
    min-height: 44px;
  }
  .quick-btn:active, .quick-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Label list */
  .label-list { display: flex; flex-direction: column; gap: 8px; }
  .label-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .label-room { font-family: var(--mono); font-size: 13px; color: var(--accent2); }
  .label-time { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .label-del {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 4px; line-height: 1;
    flex-shrink: 0; min-width: 32px; min-height: 32px;
    display: flex; align-items: center; justify-content: center;
  }
  .label-del:active { color: var(--warn); }

  /* ── Empty states ───────────────────────────────────────────────────────── */
  .empty {
    text-align: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    padding: 32px 0;
  }

  /* ── Toast ──────────────────────────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: calc(var(--nav-h) + var(--safe-b) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    padding: 8px 16px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity .2s, transform .2s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">CSI<span>//</span>MONITOR</div>
    <div id="last-update" style="flex:1;text-align:center"></div>
    <div id="rx-summary" style="font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap"></div>
    <div class="stream-badge">
      <div class="dot" id="stream-dot"></div>
      <span id="stream-label">connecting</span>
    </div>
  </header>

  <!-- Pages -->
  <div id="pages">

    <!-- LIVE page -->
    <div class="page active" id="page-live">
      <div class="section-title">Receivers</div>
      <div id="receiver-grid"><div class="empty">waiting for data…</div></div>
    </div>

    <!-- CHART page -->
    <div class="page" id="page-chart">
      <div class="chart-wrap">
        <div class="chart-label">RSSI · 60 min</div>
        <canvas id="rssi-chart" height="200"></canvas>
      </div>
      <div class="chart-wrap">
        <div class="chart-label">σ RSSI variance · 60 min</div>
        <canvas id="var-chart" height="160"></canvas>
      </div>
    </div>

    <!-- HEATMAP page -->
    <div class="page" id="page-heatmap">
      <div class="heatmap-select-wrap">
        <select id="heatmap-rx"><option value="">— select receiver —</option></select>
      </div>
      <div id="heatmap-canvas-wrap">
        <canvas id="heatmap-canvas" height="120"></canvas>
        <div class="heatmap-meta" id="heatmap-meta">no data</div>
      </div>
    </div>

    <!-- LABEL page -->
    <div class="page" id="page-label">
      <div class="label-form">
        <div class="section-title">New Label</div>

        <div class="field">
          <label>ROOM</label>
          <div class="quick-btns" id="quick-btns">
            <button class="quick-btn" onclick="quickRoom(this,'living_room')">Living Room</button>
            <button class="quick-btn" onclick="quickRoom(this,'kitchen')">Kitchen</button>
            <button class="quick-btn" onclick="quickRoom(this,'bedroom')">Bedroom</button>
            <button class="quick-btn" onclick="quickRoom(this,'office')">Office</button>
            <button class="quick-btn" onclick="quickRoom(this,'hallway')">Hallway</button>
            <button class="quick-btn" onclick="quickRoom(this,'empty')">Empty</button>
          </div>
          <input type="text" id="label-room" placeholder="or type room name…" style="margin-top:6px;font-size:16px">
        </div>

        <div class="row-2">
          <div class="field">
            <label>START</label>
            <input type="datetime-local" id="label-start">
          </div>
          <div class="field">
            <label>END</label>
            <input type="datetime-local" id="label-end">
          </div>
        </div>

        <div class="field">
          <label>OCCUPANTS</label>
          <input type="number" id="label-occupants" value="1" min="0" max="20">
        </div>

        <div class="field">
          <label>NOTES (optional)</label>
          <textarea id="label-notes" placeholder="e.g. walking, sitting, TV on…"></textarea>
        </div>

        <div style="display:flex;gap:10px">
          <button class="quick-btn" style="flex:1" onclick="setLastN(5)">Last 5 min</button>
          <button class="quick-btn" style="flex:1" onclick="setLastN(15)">Last 15 min</button>
          <button class="quick-btn" style="flex:1" onclick="setLastN(30)">Last 30 min</button>
        </div>

        <button class="btn" onclick="submitLabel()">Save Label</button>
      </div>

      <div class="section-title">Recent Labels</div>
      <div class="label-list" id="label-list"><div class="empty">no labels yet</div></div>
    </div>

  </div>

  <!-- Nav -->
  <nav>
    <button class="nav-btn active" data-page="page-live" onclick="showPage(this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M6.3 6.3a8 8 0 0 0 0 11.4M17.7 6.3a8 8 0 0 1 0 11.4M3.5 3.5a14 14 0 0 0 0 17M20.5 3.5a14 14 0 0 1 0 17"/></svg>
      Live
    </button>
    <button class="nav-btn" data-page="page-chart" onclick="showPage(this)">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Chart
    </button>
    <button class="nav-btn" data-page="page-heatmap" onclick="showPage(this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Heatmap
    </button>
    <button class="nav-btn" data-page="page-label" onclick="showPage(this)">
      <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      Label
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
'use strict';

const API = window.location.origin;

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── State ─────────────────────────────────────────────────────────────────────
const receivers = {};        // id → receiver object
const rssiHistory = {};      // name → [{x, y}]
const varHistory = {};       // name → [{x, y}]
let rssiChart = null;
let varChart = null;
let selectedHeatmapRx = null;
let historyLoaded = false;
let heatmapTimer = null;

// ── Navigation ────────────────────────────────────────────────────────────────
function showPage(btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btn.dataset.page).classList.add('active');
  btn.classList.add('active');
}

// ── SSE stream ────────────────────────────────────────────────────────────────
function connectStream() {
  const es = new EventSource(`${API}/api/stream`);
  const dot = document.getElementById('stream-dot');
  const lbl = document.getElementById('stream-label');

  es.onopen = () => { dot.className = 'dot live'; lbl.textContent = 'live'; };
  es.onerror = () => { dot.className = 'dot error'; lbl.textContent = 'reconnecting…'; };

  es.onmessage = e => {
    const d = JSON.parse(e.data);
    onStreamUpdate(d);
    document.getElementById('last-update').textContent =
      new Date(d.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  };
}

function onStreamUpdate(data) {
  for (const rx of data.receivers) {
    receivers[rx.id] = rx;

    if (!rssiHistory[rx.name]) rssiHistory[rx.name] = [];
    if (!varHistory[rx.name])  varHistory[rx.name]  = [];

    if (rx.avg_rssi != null) {
      rssiHistory[rx.name].push({ x: data.timestamp, y: rx.avg_rssi });
      if (rssiHistory[rx.name].length > 120) rssiHistory[rx.name].shift();
    }
    if (rx.stddev_rssi != null) {
      varHistory[rx.name].push({ x: data.timestamp, y: rx.stddev_rssi });
      if (varHistory[rx.name].length > 120) varHistory[rx.name].shift();
    }
  }

  renderCards(data.receivers);
  updateRxSummary(data.receivers);
  updateCharts();
  syncHeatmapSelector(data.receivers);

  if (!historyLoaded && data.receivers.length > 0) {
    historyLoaded = true;
    loadHistory();
  }
}

// ── Receiver summary (header) ─────────────────────────────────────────────────
function updateRxSummary(rxList) {
  const live  = rxList.filter(rx => !isStale(rx)).length;
  const total = rxList.length;
  const el = document.getElementById('rx-summary');
  if (total === 0) { el.textContent = ''; return; }
  el.textContent = `${live}/${total} live`;
  el.style.color = live === total ? 'var(--accent2)' : live === 0 ? 'var(--warn)' : 'var(--text-dim)';
}

// ── Receiver cards ────────────────────────────────────────────────────────────
const STALE_MS = 12_000;
const isStale = rx => !rx.last_seen || (Date.now() - new Date(rx.last_seen)) > STALE_MS;

function renderCards(rxList) {
  const grid = document.getElementById('receiver-grid');
  if (!rxList.length) { grid.innerHTML = '<div class="empty">no receivers</div>'; return; }

  for (const rx of rxList) {
    let card = document.getElementById(`rxc-${rx.id}`);
    if (!card) {
      card = document.createElement('div');
      card.id = `rxc-${rx.id}`;
      if (grid.querySelector('.empty')) grid.innerHTML = '';
      grid.appendChild(card);
    }

    const stale = isStale(rx);
    card.className = `rx-card ${stale ? 'stale' : 'active'}`;

    const rssi = rx.avg_rssi != null ? rx.avg_rssi.toFixed(1) : '—';
    const rssiCls = rx.avg_rssi != null ? (rx.avg_rssi > -65 ? 'good' : rx.avg_rssi < -80 ? 'warn' : '') : '';
    const stddev = rx.stddev_rssi != null ? rx.stddev_rssi.toFixed(2) : '—';
    const samples = rx.sample_count ?? 0;
    const varPct = rx.stddev_rssi != null ? Math.min(100, rx.stddev_rssi / 5 * 100) : 0;
    const seenAgo = rx.last_seen
      ? Math.round((Date.now() - new Date(rx.last_seen)) / 1000) + 's ago'
      : 'never';

    card.innerHTML = `
      <div class="rx-header">
        <div>
          <div class="rx-name">${escHtml(rx.name)}</div>
          <div class="rx-loc">floor ${escHtml(rx.floor ?? '?')} · ${escHtml(rx.location ?? '—')}</div>
        </div>
        <div class="rx-pill ${stale ? 'stale' : 'live'}">${stale ? 'stale' : 'live'}</div>
      </div>
      <div class="rx-stats">
        <div class="stat">
          <div class="stat-label">RSSI</div>
          <div class="stat-value ${rssiCls}">${rssi}<small style="font-size:10px"> dBm</small></div>
        </div>
        <div class="stat">
          <div class="stat-label">σ RSSI</div>
          <div class="stat-value">${stddev}</div>
        </div>
        <div class="stat">
          <div class="stat-label">seen</div>
          <div class="stat-value" style="font-size:11px">${seenAgo}</div>
        </div>
      </div>
      <div class="rx-bar-wrap"><div class="rx-bar" style="width:${varPct}%"></div></div>
    `;
  }
}

// ── Charts ────────────────────────────────────────────────────────────────────
const PALETTE = ['#00d4ff', '#00ff9d', '#ff6b35', '#c77dff', '#ffd166', '#ef476f'];

function chartDefaults(yLabel) {
  return {
    type: 'line',
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#4a6a88', font: { size: 10 }, boxWidth: 10 } } },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'minute', displayFormats: { minute: 'HH:mm' } },
          ticks: { color: '#4a6a88', font: { size: 9 }, maxTicksLimit: 6 },
          grid: { color: '#1a2d45' },
        },
        y: {
          ticks: { color: '#4a6a88', font: { size: 9 } },
          grid: { color: '#1a2d45' },
          title: { display: false },
        },
      },
    },
  };
}

function initCharts() {
  const rssiCtx = document.getElementById('rssi-chart').getContext('2d');
  const varCtx  = document.getElementById('var-chart').getContext('2d');
  rssiChart = new Chart(rssiCtx, chartDefaults('dBm'));
  varChart  = new Chart(varCtx,  chartDefaults('σ'));
}

function updateCharts() {
  if (!rssiChart || !varChart) return;
  const rxList = Object.values(receivers);

  rssiChart.data.datasets = rxList
    .filter(rx => rssiHistory[rx.name]?.length)
    .map((rx, i) => ({
      label: rx.name,
      data: rssiHistory[rx.name],
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    }));

  varChart.data.datasets = rxList
    .filter(rx => varHistory[rx.name]?.length)
    .map((rx, i) => ({
      label: rx.name,
      data: varHistory[rx.name],
      borderColor: PALETTE[i % PALETTE.length],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      tension: 0.3,
    }));

  rssiChart.update('none');
  varChart.update('none');
}

async function loadHistory() {
  for (const [i, rx] of Object.values(receivers).entries()) {
    try {
      const res = await fetch(`${API}/api/history/variance?receiver_id=${rx.id}&minutes=60`);
      if (!res.ok) continue;
      const rows = await res.json();
      rssiHistory[rx.name] = rows.map(r => ({ x: r.time, y: r.avg_rssi })).filter(p => p.y != null);
      varHistory[rx.name]  = rows.map(r => ({ x: r.time, y: r.stddev_rssi })).filter(p => p.y != null);
    } catch (_) {}
  }
  updateCharts();
}

// ── Heatmap ───────────────────────────────────────────────────────────────────
function syncHeatmapSelector(rxList) {
  const sel = document.getElementById('heatmap-rx');
  const existing = new Set([...sel.options].map(o => o.value));
  for (const rx of rxList) {
    if (rx.role !== 'receiver') continue;
    if (!existing.has(String(rx.id))) {
      const opt = document.createElement('option');
      opt.value = rx.id;
      opt.textContent = rx.name;
      sel.appendChild(opt);
    }
  }
}

document.getElementById('heatmap-rx').addEventListener('change', function() {
  selectedHeatmapRx = this.value ? parseInt(this.value) : null;
  if (selectedHeatmapRx) fetchHeatmap(selectedHeatmapRx);
});

async function fetchHeatmap(rxId) {
  try {
    const res = await fetch(`${API}/api/history/snapshot?receiver_id=${rxId}&limit=1`);
    if (!res.ok) return;
    const rows = await res.json();
    if (!rows.length) return;
    drawHeatmap(rows[0]);
  } catch (_) {}
}

function drawHeatmap(sample) {
  const canvas = document.getElementById('heatmap-canvas');
  const meta   = document.getElementById('heatmap-meta');
  const amp    = sample.amplitude;
  const n      = amp.length;
  if (!n) return;

  const cols = sample.subcarrier_count || n;
  const rows = sample.antenna_count    || 1;

  canvas.width  = cols;
  canvas.height = rows;

  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(cols, rows);

  const mn = Math.min(...amp);
  const mx = Math.max(...amp);
  const rng = mx - mn || 1;

  for (let i = 0; i < amp.length; i++) {
    const t = (amp[i] - mn) / rng; // 0..1
    // Map to cyan-green gradient matching theme
    const r = Math.round(t * 0);
    const g = Math.round(80 + t * 175);
    const b = Math.round(255 - t * 100);
    img.data[i * 4 + 0] = r;
    img.data[i * 4 + 1] = g;
    img.data[i * 4 + 2] = b;
    img.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);

  const t = new Date(sample.time);
  meta.innerHTML = `
    <span>${cols} subcarriers · ${rows} antenna${rows > 1 ? 's' : ''}</span>
    <span>RSSI ${sample.rssi} dBm</span>
    <span>${t.toLocaleTimeString()}</span>
    ${sample.label ? `<span style="color:var(--accent2)">${escHtml(sample.label)}</span>` : ''}
  `;
}

// Refresh heatmap every 2s when on heatmap page
setInterval(() => {
  if (selectedHeatmapRx && document.getElementById('page-heatmap').classList.contains('active')) {
    fetchHeatmap(selectedHeatmapRx);
  }
}, 2000);

// ── Labels ────────────────────────────────────────────────────────────────────
function quickRoom(btn, room) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('label-room').value = room;
}

function setLastN(minutes) {
  const now   = new Date();
  const start = new Date(now - minutes * 60_000);
  document.getElementById('label-end').value   = toLocalDT(now);
  document.getElementById('label-start').value = toLocalDT(start);
}

function toLocalDT(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function submitLabel() {
  const room      = document.getElementById('label-room').value.trim();
  const startRaw  = document.getElementById('label-start').value;
  const endRaw    = document.getElementById('label-end').value;
  const occupants = parseInt(document.getElementById('label-occupants').value) || 1;
  const notes     = document.getElementById('label-notes').value.trim() || null;

  if (!room)     { toast('Room is required', 'warn'); return; }
  if (!startRaw) { toast('Start time required', 'warn'); return; }
  if (!endRaw)   { toast('End time required', 'warn'); return; }

  const time_start = new Date(startRaw).toISOString();
  const time_end   = new Date(endRaw).toISOString();

  try {
    const res = await fetch(`${API}/api/labels`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room, time_start, time_end, occupants, notes }),
    });
    if (!res.ok) {
      const err = await res.json();
      toast(JSON.stringify(err.detail ?? err), 'warn');
      return;
    }
    toast(`Label "${room}" saved`, 'ok');
    document.getElementById('label-room').value = '';
    document.getElementById('label-notes').value = '';
    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
    loadLabels();
  } catch (e) {
    toast('Network error', 'warn');
  }
}

async function loadLabels() {
  try {
    const res = await fetch(`${API}/api/labels?minutes=480`);
    if (!res.ok) return;
    const labels = await res.json();
    renderLabels(labels);
  } catch (_) {}
}

function renderLabels(labels) {
  const list = document.getElementById('label-list');
  if (!labels.length) { list.innerHTML = '<div class="empty">no labels yet</div>'; return; }
  list.innerHTML = labels.map(l => {
    const s = new Date(l.time_start).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const e = new Date(l.time_end).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const day = new Date(l.time_start).toLocaleDateString([], { month: 'short', day: 'numeric' });
    return `
      <div class="label-item">
        <div>
          <div class="label-room">${escHtml(l.room)} · ${escHtml(l.occupants)} occ</div>
          <div class="label-time">${escHtml(day)} ${escHtml(s)} – ${escHtml(e)}${l.notes ? ' · ' + escHtml(l.notes) : ''}</div>
        </div>
        <button class="label-del" onclick="deleteLabel(${parseInt(l.id)})" title="Delete">✕</button>
      </div>
    `;
  }).join('');
}

async function deleteLabel(id) {
  try {
    const res = await fetch(`${API}/api/labels/${id}`, { method: 'DELETE' });
    if (res.ok) { toast('Label deleted', 'ok'); loadLabels(); }
  } catch (_) {}
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = type === 'warn' ? 'var(--warn)' : 'var(--accent2)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initCharts();
connectStream();
loadLabels();
setInterval(loadLabels, 30_000);

// Pre-fill label end time to now on label page open
document.querySelector('[data-page="page-label"]').addEventListener('click', () => {
  if (!document.getElementById('label-end').value) {
    document.getElementById('label-end').value = toLocalDT(new Date());
  }
});
</script>
